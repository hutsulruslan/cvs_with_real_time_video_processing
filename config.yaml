video:
  source_type: "camera"
  camera_index: 0
  file_path: "assets/samples/sample_video.mp4"
  stream_url: ""
  width: 640
  height: 480

model:
  runtime: "mock"
  model_path: "assets/models/model.tflite"
  labels_path: "assets/models/labels.txt"
  input_width: 320
  input_height: 320
  confidence_threshold: 0.4
  nms_threshold: 0.5
  normalize: false

preprocessing:
  low_light:
    enabled: false
    mode: "off"
    gamma: 1.5
    brightness_threshold: 65
    clahe_clip_limit: 2.0
    clahe_tile_grid_size: 8

processing:
  pipeline_mode: "sequential"
  frame_skip: 0
  enable_tracking: false
  max_detections: 20

display:
  show_window: true
  show_fps: true
  window_name: "Edge Vision System"

storage:
  save_detections: false
  save_frames: false
  output_dir: "output"
  format: "csv"
